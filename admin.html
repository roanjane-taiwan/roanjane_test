<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoanJane Admin | 數據儀表板</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 引入專業圖表庫 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --brand-bg: #FDFCFB;
            --brand-surface: #F5F2EE;
            --brand-primary: #E2C8BA;
            --brand-primary-dark: #B89B8D;
            --brand-brown: #4A4138;
            --brand-text-muted: #8E847C;
            --brand-white: #FFFFFF;
            --sidebar-width: 260px;
            --status-green: #A5D6A7;
            --status-yellow: #FFF59D;
            --status-red: #EF9A9A;
        }

        * { box-sizing: border-box; }
        body { 
            background: #EFECE8; 
            font-family: 'Noto Sans TC', sans-serif; 
            color: var(--brand-brown); 
            margin: 0; 
            display: flex;
            min-height: 100vh;
        }

        /* Loading Overlay */
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); backdrop-blur: 4px; z-index: 9999; 
            justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            border: 4px solid var(--brand-surface); border-top: 4px solid var(--brand-primary); border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--brand-brown);
            color: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .sidebar-header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar-logo { width: 100px; border-radius: 12px; margin-bottom: 15px; }
        .sidebar-nav { flex: 1; padding: 20px 15px; }
        .nav-btn {
            width: 100%; padding: 15px 20px; margin-bottom: 10px; background: transparent;
            border: none; color: rgba(255,255,255,0.6); border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 500;
            transition: all 0.3s; text-align: left;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-btn.active { background: var(--brand-primary); color: var(--brand-brown); font-weight: 700; }

        /* Main Content */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px 50px; max-width: 1400px; }

        .card { 
            background: var(--brand-white); padding: 40px; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(74, 65, 56, 0.05); display: none; 
            border: 1px solid rgba(226, 200, 186, 0.2);
        }
        .card.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Specific Styles */
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box {
            background: var(--brand-white); padding: 25px; border-radius: 24px;
            border: 1px solid var(--brand-surface); display: flex; flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .stat-box .title { font-size: 13px; font-weight: 700; color: var(--brand-primary-dark); margin-bottom: 10px; }
        .stat-box .value { font-size: 28px; font-weight: 700; color: var(--brand-brown); }
        .stat-box .trend { font-size: 12px; margin-top: 8px; font-weight: 500; }

        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .chart-card { background: white; border-radius: 24px; padding: 30px; border: 1px solid var(--brand-surface); }
        .chart-title { font-size: 16px; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 8px; }

        /* Sync Tabs */
        .sync-tabs { display: flex; gap: 15px; margin-bottom: 30px; }
        .sync-tab { padding: 12px 25px; background: var(--brand-surface); border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 700; transition: 0.3s; color: var(--brand-text-muted); border: 2px solid transparent; }
        .sync-tab.active { background: var(--brand-white); border-color: var(--brand-primary); color: var(--brand-brown); }

        .upload-zone { border: 2px dashed var(--brand-primary); background: var(--brand-bg); padding: 60px; border-radius: 24px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 30px; }
        .upload-zone:hover { background: var(--brand-surface); border-color: var(--brand-primary-dark); }

        .btn { padding: 16px 30px; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--brand-brown); color: var(--brand-white); box-shadow: 0 8px 20px rgba(74, 65, 56, 0.15); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(74, 65, 56, 0.2); }

        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #EFECE8; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--brand-white); padding: 50px; border-radius: 40px; width: 400px; text-align: center; box-shadow: 0 30px 70px rgba(74, 65, 56, 0.1); }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText" style="color: var(--brand-brown); margin-top:15px; font-weight: 700;">系統處理中...</div>
    </div>

    <div id="loginOverlay">
        <div class="login-card">
            <img src="https://i.postimg.cc/LsQ1w407/RJ-3.jpg" style="width: 140px; border-radius: 20px; margin-bottom: 25px;">
            <h3 style="letter-spacing: 0.2em; margin-bottom: 30px;">RoanJane 經營數據台</h3>
            <input type="password" id="adminPwd" style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; text-align: center; margin-bottom: 20px; font-size: 16px;" placeholder="請輸入管理密碼">
            <button class="btn btn-primary" onclick="login()" style="width: 100%;">進入管理系統</button>
        </div>
    </div>

    <aside class="sidebar" id="sidebar" style="display:none;">
        <div class="sidebar-header">
            <img src="https://i.postimg.cc/LsQ1w407/RJ-3.jpg" class="sidebar-logo">
            <div style="font-size: 11px; letter-spacing: 0.2em; opacity: 0.5;">ADMIN CENTER</div>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-btn active" onclick="switchTab('dashboard', this); initDashboard()">
                <i data-lucide="layout-dashboard"></i> <span class="nav-text">經營數據儀表板</span>
            </button>
            <button class="nav-btn" onclick="switchTab('excel', this)">
                <i data-lucide="refresh-cw"></i> <span class="nav-text">資料同步中心</span>
            </button>
            <button class="nav-btn" onclick="switchTab('pos', this)">
                <i data-lucide="search"></i> <span class="nav-text">查詢與核銷</span>
            </button>
            <button class="nav-btn" onclick="switchTab('marketing', this)">
                <i data-lucide="ticket"></i> <span class="nav-text">優惠券派發</span>
            </button>
        </nav>
    </aside>

    <main class="main-content" id="mainContent" style="display:none;">
        
        <!-- 數據儀表板 (新功能) -->
        <div id="dashboardSection" class="card active">
            <div class="page-header">
                <div class="page-title">
                    <h2>經營數據儀表板</h2>
                    <p>即時分析會員結構與經營成效</p>
                </div>
                <div id="lastSyncText" style="font-size: 12px; opacity: 0.5;">最後數據讀取日期：尚未讀取</div>
            </div>

            <div class="dashboard-grid">
                <div class="stat-box">
                    <span class="title">全體會員數</span>
                    <span class="value" id="stat-total">0</span>
                    <span class="trend" style="color: #666;">系統總註冊人數</span>
                </div>
                <div class="stat-box">
                    <span class="title">VIP 會員數</span>
                    <span class="value" id="stat-vip">0</span>
                    <span class="trend" id="stat-vip-ratio" style="color: var(--brand-primary-dark);">佔比 0%</span>
                </div>
                <div class="stat-box">
                    <span class="title">45天內活躍會員</span>
                    <span class="value" id="stat-active">0</span>
                    <span class="trend" style="color: #4CAF50;">✅ 健康指標</span>
                </div>
                <div class="stat-box">
                    <span class="title">需要召回會員</span>
                    <span class="value" id="stat-lost">0</span>
                    <span class="trend" style="color: #F44336;">🚨 警示指標</span>
                </div>
            </div>

            <div class="chart-row">
                <div class="chart-card">
                    <div class="chart-title"><i data-lucide="pie-chart" style="width: 18px;"></i> 會員活躍度結構</div>
                    <div style="height: 300px; display: flex; justify-content: center;">
                        <canvas id="activeChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="chart-title"><i data-lucide="bar-chart-2" style="width: 18px;"></i> 專櫃經營成效 (會員分佈)</div>
                    <div style="height: 300px;">
                        <canvas id="storeChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="chart-card" style="margin-top: 20px;">
                <div class="chart-title"><i data-lucide="trending-up" style="width: 18px;"></i> 消費等級分佈</div>
                <div style="height: 250px;">
                    <canvas id="levelChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Excel 資料同步區 -->
        <div id="excelSection" class="card">
            <div class="page-header">
                <div class="page-title">
                    <h2>Excel 資料同步中心</h2>
                    <p>解析 Excel 並自動更新數據分析結果</p>
                </div>
            </div>

            <div class="sync-tabs">
                <div class="sync-tab active" onclick="setSyncType('members', this)">會員資料同步</div>
                <div class="sync-tab" onclick="setSyncType('orders', this)">訂單紀錄匯入</div>
                <div class="sync-tab" onclick="setSyncType('points', this)">紅利點數匯入</div>
            </div>

            <div class="upload-zone" onclick="document.getElementById('excelFile').click()">
                <div id="uploadPlaceholder">
                    <i data-lucide="file-up" style="width: 48px; height: 48px; margin-bottom: 15px; color: var(--brand-primary);"></i>
                    <h3 id="uploadTitle">點擊上傳 會員資料 Excel</h3>
                    <p id="uploadModeText" class="mode-badge mode-update">🔄 覆蓋更新模式</p>
                </div>
                <input type="file" id="excelFile" hidden accept=".xlsx, .xls" onchange="handleExcelSelect(event)">
            </div>

            <div id="previewArea" style="display: none;" class="preview-area">
                <h4 style="margin-bottom:15px; color: var(--brand-primary-dark);">資料預覽 (顯示前 5 筆)</h4>
                <div style="overflow-x: auto; background: var(--brand-bg); padding: 15px; border-radius: 15px;">
                    <table class="preview-table" id="previewTable" style="width:100%; border-collapse:collapse;"></table>
                </div>
                <div style="margin-top: 30px; text-align: right;">
                    <button class="btn btn-primary" onclick="confirmAndSync()">確認同步並更新分析</button>
                </div>
            </div>
        </div>

        <!-- 查詢核銷區 (省略部分樣式以保持簡潔) -->
        <div id="posSection" class="card">
            <h2>查詢與核銷</h2>
            <div style="display:flex; gap:15px; margin-top:20px;">
                <input type="tel" id="searchPhone" style="flex:1; padding:15px; border-radius:12px; border:1px solid #ddd;" placeholder="會員電話">
                <button class="btn btn-primary" onclick="searchMember()">查詢</button>
            </div>
            <div id="memberResult" style="display:none; margin-top:30px;">
                <h3 id="memName"></h3>
                <div id="couponList"></div>
            </div>
        </div>

        <!-- 優惠券派發 (省略部分樣式) -->
        <div id="marketingSection" class="card">
            <h2>優惠券派發</h2>
            <!-- 略 -->
        </div>

    </main>

    <script>
        lucide.createIcons();

        const API_URL = "https://script.google.com/macros/s/AKfycbwkF0BFqFM392iIgHzeOyJCGyCTvcN58JsyosQI9P_gRvD5uFySgLP1ZHSrrz9izpM3sg/exec";
        let PASSWORD = "";
        let currentSyncType = 'members';
        let excelData = null;
        let charts = {}; // 儲存圖表實例

        function showLoading(text = "處理中...") { 
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').style.display = 'flex'; 
        }
        function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

        function login() {
            var pwd = document.getElementById('adminPwd').value;
            if(!pwd) return Swal.fire('錯誤', '請輸入密碼', 'error');
            showLoading("身分驗證中...");
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'verify_admin', password: pwd }) })
            .then(r => r.json()).then(res => {
                hideLoading();
                if(res.status === 'success') {
                    PASSWORD = pwd;
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('sidebar').style.display = 'flex';
                    document.getElementById('mainContent').style.display = 'block';
                    initDashboard(); // 預設進入儀表板
                } else { Swal.fire('登入失敗', '密碼不正確', 'error'); }
            });
        }

        // --- 儀表板分析核心邏輯 ---
        function initDashboard() {
            if (!excelData && currentSyncType === 'members') {
                // 如果還沒上傳 Excel，嘗試抓取目前的雲端統計 (假定 GAS 有回傳統計)
                return;
            }
            analyzeMemberData(excelData);
        }

        function analyzeMemberData(data) {
            if (!data || data.length === 0) return;

            const total = data.length;
            const vipCount = data.filter(m => String(m['等級'] || m['level']).toUpperCase().includes('VIP')).length;
            
            // 計算活躍度 (假設欄位名稱為 '最後購買日' 或 'last_purchase')
            const today = new Date();
            let active = 0, chilled = 0, lost = 0;

            data.forEach(m => {
                const dateStr = m['最後購買日'] || m['last_purchase'];
                if (dateStr) {
                    const lastDate = new Date(dateStr);
                    const diffDays = (today - lastDate) / (1000 * 60 * 60 * 24);
                    if (diffDays <= 45) active++;
                    else if (diffDays <= 90) chilled++;
                    else lost++;
                } else {
                    lost++;
                }
            });

            // 更新數字
            document.getElementById('stat-total').innerText = total.toLocaleString();
            document.getElementById('stat-vip').innerText = vipCount.toLocaleString();
            document.getElementById('stat-vip-ratio').innerText = `佔比 ${Math.round((vipCount/total)*100)}%`;
            document.getElementById('stat-active').innerText = active.toLocaleString();
            document.getElementById('stat-lost').innerText = lost.toLocaleString();
            document.getElementById('lastSyncText').innerText = `最後分析時間：${new Date().toLocaleString()}`;

            // 渲染圖表
            renderActiveChart(active, chilled, lost);
            renderStoreChart(data);
            renderLevelChart(data);
        }

        function renderActiveChart(active, chilled, lost) {
            const ctx = document.getElementById('activeChart').getContext('2d');
            if (charts.active) charts.active.destroy();
            charts.active = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['活躍 (45天內)', '冷卻 (45-90天)', '流失 (>90天)'],
                    datasets: [{
                        data: [active, chilled, lost],
                        backgroundColor: ['#A5D6A7', '#FFF59D', '#EF9A9A'],
                        borderWidth: 0
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        }

        function renderStoreChart(data) {
            // 假設欄位為 '所屬專櫃' 或 'store'
            const storeMap = {};
            data.forEach(m => {
                const store = m['所屬專櫃'] || m['store'] || '其他';
                storeMap[store] = (storeMap[store] || 0) + 1;
            });

            const ctx = document.getElementById('storeChart').getContext('2d');
            if (charts.store) charts.store.destroy();
            charts.store = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(storeMap),
                    datasets: [{
                        label: '會員數',
                        data: Object.values(storeMap),
                        backgroundColor: '#E2C8BA',
                        borderRadius: 8
                    }]
                },
                options: { maintainAspectRatio: false, indexAxis: 'y' }
            });
        }

        function renderLevelChart(data) {
            const levelMap = {};
            data.forEach(m => {
                const lvl = m['等級'] || m['level'] || '一般';
                levelMap[lvl] = (levelMap[lvl] || 0) + 1;
            });

            const ctx = document.getElementById('levelChart').getContext('2d');
            if (charts.level) charts.level.destroy();
            charts.level = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(levelMap),
                    datasets: [{
                        label: '人數',
                        data: Object.values(levelMap),
                        backgroundColor: '#4A4138',
                        borderRadius: 8
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        // --- 原有 Excel 與同步邏輯 ---
        function setSyncType(type, btn) {
            currentSyncType = type;
            document.querySelectorAll('.sync-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            const titleMap = { 'members': '會員資料 Excel', 'orders': '訂單紀錄 Excel', 'points': '紅利點數 Excel' };
            document.getElementById('uploadTitle').innerText = `點擊上傳 ${titleMap[type]}`;
            document.getElementById('previewArea').style.display = 'none';
        }

        function handleExcelSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                
                let skipRange = 0;
                if (currentSyncType === 'orders') skipRange = 3;
                if (currentSyncType === 'points') skipRange = 2;

                excelData = XLSX.utils.sheet_to_json(worksheet, { range: skipRange });

                if (excelData.length > 0) {
                    renderPreview(excelData.slice(0, 5));
                    document.getElementById('previewArea').style.display = 'block';
                    // 上傳後即時分析，不一定要等同步
                    if (currentSyncType === 'members') analyzeMemberData(excelData);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function renderPreview(data) {
            const table = document.getElementById('previewTable');
            const headers = Object.keys(data[0]);
            let html = `<tr>${headers.map(h => `<th style="padding:10px; text-align:left; font-size:12px; border-bottom:2px solid #E2C8BA;">${h}</th>`).join('')}</tr>`;
            data.forEach(row => {
                html += `<tr>${headers.map(h => `<td style="padding:10px; border-bottom:1px solid #eee; font-size:12px;">${row[h] || ''}</td>`).join('')}</tr>`;
            });
            table.innerHTML = html;
        }

        async function confirmAndSync() {
            if (!excelData) return;
            const actionMap = { 'members': 'batch_update_members', 'orders': 'batch_add_orders', 'points': 'batch_add_points' };
            
            showLoading(`同步中...`);
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: actionMap[currentSyncType], password: PASSWORD, data: excelData })
                });
                const res = await response.json();
                hideLoading();
                if (res.status === 'success') {
                    Swal.fire('成功', '資料已同步至雲端', 'success');
                    document.getElementById('previewArea').style.display = 'none';
                } else { Swal.fire('失敗', res.message, 'error'); }
            } catch (e) {
                hideLoading();
                Swal.fire('連線錯誤', '無法傳送至 GAS', 'error');
            }
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.card').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id + 'Section').classList.add('active');
            btn.classList.add('active');
        }

        function searchMember() {
            var phone = document.getElementById('searchPhone').value;
            if(!phone) return;
            showLoading("查詢中...");
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'admin_search', password: PASSWORD, phone: phone }) })
            .then(r => r.json()).then(res => {
                hideLoading();
                if(res.status !== 'success') return Swal.fire('查無資料', res.message, 'error');
                document.getElementById('memName').innerText = res.data.name;
                document.getElementById('memberResult').style.display = 'block';
                // 這裡可以再渲染優惠券列表
            });
        }
    </script>
</body>
</html>
