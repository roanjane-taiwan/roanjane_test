<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#FDFCFB',          // 奶油暖白背底
                            surface: '#F5F2EE',     // 燕麥色區塊背景
                            primary: '#E2C8BA',     // 品牌標準色
                            primaryDark: '#B89B8D', // 搭配標準色的深色字體
                            brown: '#4A4138',       // 咖啡棕 (主文字)
                            card: '#FFFFFF',        // 純白卡片
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 8px 30px rgba(74, 65, 56, 0.04)',
                        'nav': '0 -4px 20px rgba(0, 0, 0, 0.02)',
                        'header': '0 1px 0px rgba(74, 65, 56, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #EFECE8;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
            color: #4A4138;
            overflow: hidden;

        }
        /* Header 縮小優化 */
header#app-header {
    /* 原本 pt-12 (48px) 改為 pt-8 (32px), h-88 改為 h-72 */
    padding-top: 32px; 
    padding-bottom: 8px;
    height: 72px; 
    display: flex;
    align-items: center;
}

/* 確保側邊返回按鈕位置對齊縮小後的 header */
#btn-back {
    top: 50%;
    transform: translateY(-10%);
}

/* 下方導航列文字強制 16px */
.nav-text {
    font-size: 16px !important;
}

/* 內容區段的文字規則 */
.view-section p {
    font-size: 16px;
}

/* 輔助性小字強制限制在 10px 以上 */
.text-min-10 {
    font-size: 10px !important;
}
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .barcode {
            height: 50px; 
            width: 100%;
            background-image: repeating-linear-gradient(
                to right,
                #1A1A1A 0, #1A1A1A 2px, transparent 2px, transparent 4px,
                #1A1A1A 4px, #1A1A1A 5px, transparent 5px, transparent 8px,
                #1A1A1A 8px, #1A1A1A 11px, transparent 11px, transparent 13px,
                #1A1A1A 13px, #1A1A1A 14px, transparent 14px, transparent 19px
            );
        }

        /* iOS 側滑動畫實作 */
        .view-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .view-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #FDFCFB;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            z-index: 10;
            padding-bottom: 120px !important;
        }
        /* 主分頁隱藏 */
        .view-main-hidden {
            opacity: 0;
            pointer-events: none;
        }
        /* 子分頁準備滑入 */
        .view-sub-ready {
            transform: translateX(100%);
            z-index: 30;
        }
        /* 子分頁啟用 (右滑入) */
        .view-sub-active {
            transform: translateX(0);
            z-index: 30;
        }
        /* 父頁面被推擠 (左微移) */
        .view-parent-pushed {
            transform: translateX(-20%);
            opacity: 0.6;
        }

        .header-item {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        /* 登入頁面背景 */
        #view-login {
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #E2C8BA;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        lucide.createIcons();

        // GAS URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwcbn2BPkm6xAq4ge08Pz7mq06yTs97wf89YWS4Pugr-qpY8Bo-qFe-lf4gySVFtXOhww/exec";
        
        let memberData = null;
        let currentBaseTab = 'home';
        let isSubViewOpen = false;
        let isLoggedIn = false;
        
        const headerLogoContainer = document.getElementById('header-logo-container');
        const headerSubtitle = document.getElementById('header-subtitle');
        const btnBack = document.getElementById('btn-back');
        const appHeader = document.getElementById('app-header');
        const appNav = document.getElementById('app-nav');

        async function handleLogin() {
    const phoneInput = document.getElementById('login-phone');
    const loginBtn = document.getElementById('login-submit');
    const loginLoader = document.getElementById('login-loader');
    const loginError = document.getElementById('login-error');
    const phone = phoneInput.value.replace(/\D/g, ''); // 確保只取數字

    if (phone.length < 9) {
        alert("請輸入正確的手機號碼");
        return;
    }

    // 1. 顯示 Loading 狀態
    loginBtn.disabled = true;
    loginLoader.classList.remove('hidden');
    loginError.style.opacity = "0";

    try {
        // 使用你上面定義的 GAS_URL 變數
        const response = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "member_login",
                phone: phone
            })
        });

        const text = await response.text();
        const res = JSON.parse(text);

        if (res.status === 'success') {
            // 2. 登入成功處理
            memberData = res.data;
            isLoggedIn = true;

            // 執行渲染
            renderMemberData(res.data); 

            // 3. 畫面切換：隱藏登入頁，顯示 Header 和 Nav
            document.getElementById('view-login').classList.add('view-main-hidden');
            document.getElementById('view-home').classList.remove('view-main-hidden');
            document.getElementById('app-header').classList.remove('hidden');
            document.getElementById('app-nav').classList.remove('hidden');
            
            // 初始導航樣式
            updateNavStyles('home');
        } else {
            // 登入失敗
            loginError.innerText = res.message || "登入失敗";
            loginError.style.opacity = "1";
        }
    } catch (e) {
        console.error("發生錯誤:", e);
        loginError.innerText = "連線失敗，請檢查網路或 GAS 權限";
        loginError.style.opacity = "1";
    } finally {
        // 4. 結束 Loading 狀態
        loginBtn.disabled = false;
        loginLoader.classList.add('hidden');
    }
}

function renderMemberData(data) {
    // 1. 執行原本的首頁卡片與點數渲染
    renderAppData();
    
    // 2. 渲染紀錄分頁 (view-history) 的大標題卡片
    const historyHeader = document.getElementById('history-header');
    if (historyHeader) {
        historyHeader.innerHTML = `
            <p class="text-[11px] text-brand-primaryDark font-bold mb-1 tracking-widest uppercase">累積消費金額</p>
            <p class="text-3xl font-bold text-brand-brown tracking-tight mb-2">$${Number(data.total || 0).toLocaleString()}</p>
            <span class="text-[10px] px-3 py-1 bg-brand-primary/30 text-brand-brown rounded-full font-bold">累積購買 ${data.storeCount || 0} 次</span>
        `;
    }

    // 3. 渲染訂單列表 (history-list)
    const historyList = document.getElementById('history-list');
    if (data.purchaseHistory && data.purchaseHistory.length > 0) {
        historyList.innerHTML = data.purchaseHistory.map((order, index) => {
            // 只取日期部分顯示 (YYYY/MM/DD)
            const displayDate = order.date.split(' ')[0];
            return `
                <button onclick="viewOrderDetail(${index})" class="w-full flex justify-between items-center p-4 hover:bg-brand-surface/50 rounded-2xl transition-colors text-left group">
                    <div>
                        <p class="text-sm font-bold text-brand-brown mb-1">${displayDate}</p>
                        <p class="text-[10px] text-brand-primaryDark tracking-wider">訂單編號: ${order.orderId}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-brand-brown">$${Number(order.totalAmount).toLocaleString()}</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-brand-primaryDark"></i>
                    </div>
                </button>
            `;
        }).join('');
    } else {
        historyList.innerHTML = `<p class="text-xs text-center text-brand-primaryDark py-10 tracking-widest">目前尚無消費紀錄</p>`;
    }
    lucide.createIcons();
}

        function renderAppData() {
    if(!memberData) return;

    const homeContent = document.getElementById('home-content');
    const levelName = memberData.isVip ? "VIP 會員" : "一般會員";
    // 渲染優惠券列表
    const couponsList = document.getElementById('coupons-list');
    
    // 檢查是否有優惠券 (處理 GAS 回傳可能是空字串 "" 或空陣列 [] 的情況)
    const hasCoupons = memberData.coupons && memberData.coupons.length > 0 && memberData.coupons !== "";

    if (hasCoupons) {
        // 如果有優惠券，將字串解析成陣列（假設你 GAS 傳來的是逗號分隔字串，或者已經是陣列）
        // 如果 GAS 傳來的是 array 就直接 map，如果是 string 則先 split
        const couponArray = Array.isArray(memberData.coupons) 
            ? memberData.coupons 
            : memberData.coupons.split(',').filter(c => c.trim() !== "");

        couponsList.innerHTML = couponArray.map(couponRaw => {
            // 解析優惠券資訊 (假設格式為: 名稱|圖片|到期日|條款)
            const parts = couponRaw.split('|');
            const name = parts[0] || "專屬優惠券";
            const expiry = parts[2] || "無期限";
            const value = name.match(/\d+/) ? name.match(/\d+/)[0] : "折"; // 簡單抓取數字當作大標

            return `
                <div class="bg-brand-card rounded-2xl p-4 shadow-sm border border-brand-primary/40 flex gap-4 relative overflow-hidden">
                    <div class="w-[72px] flex flex-col items-center justify-center border-r border-dashed border-brand-primary/50 pr-4">
                        <span class="text-2xl font-bold text-brand-primaryDark">${value}</span>
                        <span class="text-[10px] text-brand-primaryDark font-bold mt-1">優惠</span>
                    </div>
                    <div class="flex-1 py-1">
                        <h4 class="text-sm font-bold text-brand-brown mb-1">${name}</h4>
                        <p class="text-[10px] text-brand-primaryDark mb-3">有效期限：${expiry}</p>
                        <button class="text-[10px] bg-brand-brown text-white px-4 py-1.5 rounded-full font-bold shadow-sm">立即使用</button>
                    </div>
                </div>
            `;
        }).join('');
    } else {
        // 🌟 重點：如果沒有優惠券，顯示提示文字
        couponsList.innerHTML = `
            <div class="flex flex-col items-center justify-center py-20 opacity-40">
                <i data-lucide="ticket" class="w-12 h-12 mb-4 text-brand-primaryDark"></i>
                <p class="text-xs text-brand-primaryDark tracking-[0.2em]">目前沒有可使用的優惠券</p>
            </div>
        `;
    }
    // --- VIP 進度計算邏輯 ---
    let vipProgressHtml = '';
    if (!memberData.isVip) {
        const goalAccumulated = 8000;
        const goalSingle = 5000;
        
        // 取得最高單筆消費 (從 purchaseHistory 裡找)
        const maxSingle = memberData.purchaseHistory.length > 0 
            ? Math.max(...memberData.purchaseHistory.map(o => Number(o.totalAmount))) 
            : 0;
            
        const currentTotal = Number(memberData.total || 0);
        
        // 計算差額 (取最接近升級的那個條件)
        const diffTotal = Math.max(0, goalAccumulated - currentTotal);
        const diffSingle = Math.max(0, goalSingle - maxSingle);
        const needAmount = Math.min(diffTotal, diffSingle);
        
        // 計算百分比 (累積消費進度)
        const progressPercent = Math.min(100, (currentTotal / goalAccumulated) * 100);

        vipProgressHtml = `
            <div class="mt-6 bg-brand-surface/50 rounded-2xl p-4 border border-brand-primary/20">
                <div class="flex justify-between items-end mb-2">
                    <p class="text-[11px] font-bold text-brand-brown">升級 VIP 進度</p>
                    <p class="text-[10px] text-brand-primaryDark font-medium">還差 <span class="text-brand-brown font-bold">$${needAmount.toLocaleString()}</span></p>
                </div>
                <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden">
                    <div class="h-full bg-brand-primary transition-all duration-1000" style="width: ${progressPercent}%"></div>
                </div>
                <p class="mt-2 text-[9px] text-brand-primaryDark leading-tight">
                    * 升級條件：單筆滿 $5,000 或累積滿 $8,000
                </p>
            </div>
        `;
    }

    homeContent.innerHTML = `
        <div class="bg-brand-card rounded-[2rem] overflow-hidden shadow-card mb-4 border border-brand-primary/30">
            <div class="h-40 w-full relative">
                <img src="https://i.postimg.cc/nVXzcb3j/1001.jpg" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-white via-white/20 to-transparent"></div>
            </div>
            <div class="px-6 pb-6 -mt-6 relative z-10 text-center">
                <span class="inline-block px-3 py-1 bg-brand-primary/20 text-brand-primaryDark text-[12px] font-bold tracking-[0.2em] rounded-full mb-3 uppercase">${levelName}</span>
                <h2 class="text-[24px] font-bold text-brand-brown mb-1 tracking-widest">${memberData.name}</h2>
                <p class="text-brand-primaryDark text-[16px] mb-4 tracking-widest font-light">${memberData.phone}</p>
                
                <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm mb-2">
                    <div class="barcode mb-2"></div>
                    <p class="text-[12px] text-gray-400 tracking-[0.3em] font-mono">${memberData.phone}</p>
                </div>
                ${vipProgressHtml}
            </div>
        </div>
    `;

    // 2. 渲染點數與統計資訊
    const homeStats = document.getElementById('home-stats');
    homeStats.innerHTML = `
        <div class="bg-brand-card rounded-3xl p-5 shadow-card border border-brand-primary/30 flex flex-col relative overflow-hidden">
            <div class="flex justify-between items-start mb-2 z-10">
                <p class="text-brand-primaryDark text-xs font-bold">可用點數</p>
                <button onclick="openSubView('points', '點數紀錄')" class="text-brand-primaryDark"><i data-lucide="info" class="w-4 h-4"></i></button>
            </div>
            <div class="flex items-baseline gap-1 mb-2 z-10">
                <span class="text-4xl font-bold text-brand-brown">${memberData.points || 0}</span>
                <span class="text-xs font-bold text-brand-primaryDark">P</span>
            </div>
            <span class="inline-block mt-auto text-center bg-brand-brown text-white text-[11px] font-bold py-2 rounded-xl z-10">折抵 NT$${memberData.points || 0}</span>
        </div>
        <div class="bg-brand-surface rounded-3xl p-5 shadow-card border border-brand-primary/30 flex flex-col items-center justify-center text-center">
            <div class="w-10 h-10 bg-brand-primary/40 rounded-full flex items-center justify-center mb-3 text-brand-brown"><i data-lucide="crown" class="w-5 h-5 stroke-[2]"></i></div>
            <p class="text-brand-brown text-[11px] font-bold tracking-widest mb-1">${levelName} 專屬</p>
            <p class="text-brand-primaryDark text-[10px] tracking-wide">${memberData.isVip ? '結帳再享 95折 優惠' : '累積消費升級 VIP'}</p>
        </div>
    `;
    // 渲染點數紀錄子分頁內容 (新增剩餘點數卡片)
    const pointsSummary = document.getElementById('points-summary');
    pointsSummary.innerHTML = `
        <p class="text-xs text-brand-primaryDark font-bold mb-1 tracking-widest">目前可用總點數</p>
        <p class="text-4xl font-bold text-brand-brown">${memberData.points || 0} <span class="text-sm font-normal text-brand-primaryDark">P</span></p>
    `;

    // 3. 渲染累積金額與次數 (在紀錄頁面)
    const historyHeader = document.getElementById('history-header');
    historyHeader.innerHTML = `
        <p class="text-[11px] text-brand-primaryDark font-bold mb-1 tracking-widest uppercase">Accumulated Spending</p>
        <p class="text-3xl font-bold text-brand-brown tracking-tight mb-2">$${Number(memberData.total || 0).toLocaleString()}</p>
        <span class="text-[10px] px-3 py-1 bg-brand-primary/30 text-brand-brown rounded-full font-bold">累積購買 ${memberData.storeCount || 0} 次</span>
    `;

    // 4. 點數紀錄明細渲染
    const pointsList = document.getElementById('points-list');
    if (memberData.pointsHistory && memberData.pointsHistory.length > 0) {
        pointsList.innerHTML = memberData.pointsHistory.map(p => `
            <div class="flex justify-between items-center p-4 border-b border-brand-primary/10 last:border-0">
                <div>
                    <p class="text-xs font-bold text-brand-brown">${p.amount > 0 ? '紅利發放' : '紅利扣抵'}</p>
                    <p class="text-[10px] text-brand-primaryDark">${p.date}</p>
                </div>
                <span class="text-sm font-bold ${p.amount > 0 ? 'text-green-500' : 'text-red-400'}">${p.amount > 0 ? '+' : ''}${p.amount}</span>
            </div>
        `).join('');
    } else {
        pointsList.innerHTML = `<p class="text-xs text-center text-brand-primaryDark py-10">尚無點數異動紀錄</p>`;
    }

    lucide.createIcons();
}

       function viewOrderDetail(index) {
    const ord = memberData.purchaseHistory[index];
    const detailView = document.getElementById('order-detail-content');
    
    // 1. 計算商品金額小計 (加總所有項目的 單價 * 數量)
    const rawTotal = ord.items.reduce((acc, item) => acc + (Number(item.price) * Number(item.qty)), 0);
    
    // 2. 實際支付金額 (後端抓取的 F 欄)
    const actualPaid = Number(ord.totalAmount);
    
    // 3. 計算折扣金額
    const discount = rawTotal - actualPaid;

    detailView.innerHTML = `
        <div class="bg-brand-surface rounded-3xl p-6 mb-5 leading-relaxed">
            <div class="flex justify-between mb-3 pb-3 border-b border-brand-primary/20">
                <span class="text-brand-primaryDark font-bold text-[16px] tracking-widest uppercase">訂單明細</span>
                <span class="text-brand-brown font-bold text-[16px] tracking-wider">${ord.orderId}</span>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between text-[16px]"><span class="text-brand-primaryDark">訂單來源</span><span class="text-brand-brown">${ord.store}</span></div>
                <div class="flex justify-between text-[16px]"><span class="text-brand-primaryDark">成立日期</span><span class="text-brand-brown">${ord.date}</span></div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden mb-6">
            <div class="divide-y divide-gray-50">
                ${ord.items.map(item => `
                    <div class="p-5 flex gap-4 items-center">
                        <div class="w-16 h-16 bg-brand-surface rounded-2xl flex items-center justify-center overflow-hidden shrink-0">
                             ${item.img ? `<img src="${item.img}" class="w-full h-full object-cover">` : `<i data-lucide="package" class="w-7 h-7 opacity-30"></i>`}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="text-[16px] font-bold text-brand-brown leading-snug mb-1">${item.name}</h4>
                            <p class="text-[12px] text-brand-primaryDark flex flex-wrap gap-x-2">
                                ${item.spec ? `<span>規格: ${item.spec}</span>` : ''} 
                                ${item.sku ? `<span>貨號: ${item.sku}</span>` : ''}
                            </p>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-[12px] bg-brand-surface px-2 py-0.5 rounded text-brand-brown font-bold">數量: ${item.qty}</span>
                                <span class="text-[16px] font-bold text-brand-brown">$${Number(item.price).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>

        <div class="bg-white rounded-3xl p-6 border border-brand-primary/20 space-y-3 mb-12 shadow-sm">
            <div class="flex justify-between text-xs">
                <span class="text-brand-primaryDark font-bold">商品原價總計</span>
                <span class="text-brand-brown font-bold">$${rawTotal.toLocaleString()}</span>
            </div>
            
            ${discount > 0 ? `
            <div class="flex justify-between text-xs text-red-400">
                <span class="font-bold">紅利折抵 / 滿額優惠</span>
                <span class="font-bold">- $${discount.toLocaleString()}</span>
            </div>
            ` : ''}

            <div class="pt-4 border-t border-brand-primary/30 flex justify-between items-center">
                <span class="text-sm font-bold text-brand-brown tracking-widest uppercase">實際支付金額</span>
                <span class="text-2xl font-bold text-brand-brown tracking-tighter">$${actualPaid.toLocaleString()}</span>
            </div>
        </div>
        
        <div class="h-10"></div>
    `;

    openSubView('order-detail', '消費明細');
    lucide.createIcons();
}

        function switchTab(tabId) {
            if(!isLoggedIn || isSubViewOpen) return;
            currentBaseTab = tabId;
            document.querySelectorAll('.view-section').forEach(el => {
                if(!el.id.includes('points') && !el.id.includes('detail') && el.id !== 'view-login') {
                    if(el.id === `view-${tabId}`) {
                        el.classList.remove('view-main-hidden');
                        el.scrollTop = 0;
                    } else { el.classList.add('view-main-hidden'); }
                }
            });
            updateNavStyles(tabId);
        }

        // 徹底隱藏 Logo 防止重疊
        function openSubView(viewId, title) {
            if(!isLoggedIn) return;
            isSubViewOpen = true;
            const subView = document.getElementById(`view-${viewId}`);
            const parentView = document.getElementById(`view-${currentBaseTab}`);

            parentView.classList.add('view-parent-pushed');
            subView.classList.remove('view-sub-ready');
            subView.classList.add('view-sub-active');
            subView.scrollTop = 0;

            // 徹底控制 Header 避免重疊
            headerLogoContainer.classList.add('opacity-0', 'translate-y-[-10px]');
            setTimeout(() => {
                headerLogoContainer.classList.add('hidden'); 
                headerSubtitle.classList.remove('hidden');
                headerSubtitle.innerText = title;
                setTimeout(() => {
                    headerSubtitle.classList.remove('opacity-0', 'translate-y-4');
                    headerSubtitle.classList.add('opacity-100', 'translate-y-0');
                }, 50);
            }, 150);
            
            btnBack.classList.remove('hidden');
            setTimeout(() => btnBack.classList.add('opacity-100', 'pointer-events-auto'), 10);
        }

        // 返回上一頁
        function goBack() {
            const activeSubView = document.querySelector('.view-sub-active');
            if (activeSubView) {
                activeSubView.classList.remove('view-sub-active');
                activeSubView.classList.add('view-sub-ready');
            }

            const parentView = document.getElementById(`view-${currentBaseTab}`);
            if (parentView) { parentView.classList.remove('view-parent-pushed'); }

            // 恢復 Header
            headerSubtitle.classList.remove('opacity-100', 'translate-y-0');
            headerSubtitle.classList.add('opacity-0', 'translate-y-4');
            
            setTimeout(() => {
                headerSubtitle.classList.add('hidden');
                headerLogoContainer.classList.remove('hidden');
                setTimeout(() => {
                    headerLogoContainer.classList.remove('opacity-0', 'translate-y-[-10px]');
                    headerLogoContainer.classList.add('opacity-100');
                }, 50);
            }, 150);
            
            btnBack.classList.remove('opacity-100', 'pointer-events-auto');
            setTimeout(() => btnBack.classList.add('hidden'), 300);
            
            isSubViewOpen = false;
        }

        function updateNavStyles(activeTarget) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const iconBg = btn.querySelector('.icon-bg');
                const icon = btn.querySelector('.nav-icon');
                const text = btn.querySelector('.nav-text');
                if (btn.dataset.target === activeTarget) {
                    iconBg.classList.add('bg-brand-primary/40');
                    icon.classList.remove('text-brand-primaryDark', 'stroke-[1.5]');
                    icon.classList.add('text-brand-brown', 'stroke-[2]');
                    text.classList.remove('text-brand-primaryDark', 'font-medium');
                    text.classList.add('text-brand-brown', 'font-bold');
                } else {
                    iconBg.classList.remove('bg-brand-primary/40');
                    icon.classList.remove('text-brand-brown', 'stroke-[2]');
                    icon.classList.add('text-brand-primaryDark', 'stroke-[1.5]');
                    text.classList.remove('text-brand-brown', 'font-bold');
                    text.classList.add('text-brand-primaryDark', 'font-medium');
                }
            });
        }
    </script>
</body>
